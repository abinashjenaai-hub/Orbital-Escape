<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Orbital Escape</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #2b1055 0%, #0a0410 100%);
            overflow: hidden; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            overscroll-behavior: none; font-family: 'Segoe UI', sans-serif; 
            transition: background 0.8s ease; 
        }

        #star-canvas {
            position: fixed !important;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 1 !important;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px; 
            height: 100%;
            background: transparent !important; 
            overflow: hidden;
            z-index: 10; 
        }

        canvas#c { display: block; position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        
        #hud { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px; font-weight: 900; font-size: 1.2rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .controls-right { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .icon-btn { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); border: 3px solid #fff; color: #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        #skip-box { position: absolute; bottom: 30px; right: 20px; pointer-events: auto; }
        .btn-skip { background: linear-gradient(180deg, #fca311 0%, #e63946 100%); border: 3px solid #fff; color: #fff; padding: 12px 20px; font-size: 0.85rem; border-radius: 25px; cursor: pointer; text-transform: uppercase; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 8px; }

        .heart { width: 18px; height: 18px; background: #fff; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #00f2fe; }

        .overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(12px); 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            text-align: center; 
        }

        .pop-content { background: #fff; padding: 30px; border: 4px solid #a2d2ff; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 260px; }
        .title-text { color:#e63946; font-size: 2.2rem; margin:0 0 20px 0; font-weight: 900; text-transform: uppercase; }
        .btn { background: #f1f2f6; color: #2f3542; border: 3px solid #dfe4ea; padding: 15px; font-size: 1rem; font-weight: 900; border-radius: 15px; cursor: pointer; margin: 8px 0; width: 100%; text-transform: uppercase; }
        .btn-main { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); color: #fff; border-color: #fff; }
        
        #loader { position: fixed; inset: 0; background: #1a0b2e; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #00f2fe; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #awesome-popup { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #fca311; font-size: 3rem; font-weight: 900; z-index: 60; pointer-events: none; transition: 0.3s; opacity: 0; }
        .show-awesome { transform: translate(-50%, -50%) scale(1) !important; opacity: 1 !important; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <div id="game-container">
        <div id="ui">
            <div id="hud">
                <div>LEVEL <span id="lv">1</span><br><span id="pr" style="font-size:0.8rem; opacity:0.8;">0</span><span style="font-size:0.8rem; opacity:0.8;">/10</span><div id="hp" style="margin-top:10px"></div></div>
                <div class="controls-right">
                    <button class="icon-btn" onclick="toggleMute(event)" id="mute-btn">🔊</button>
                    <button class="icon-btn" onclick="togglePause(event)">⏸️</button>
                </div>
            </div>
            <div id="skip-box">
                <button class="btn-skip" id="btn-skip-real" onclick="requestSkip(event)">Skip Level <span class="ad-badge">📺</span></button>
            </div>
        </div>
        <div id="awesome-popup">AWESOME!</div>
        <canvas id="c"></canvas>
    </div>

    <div id="loader"><div class="spinner"></div><div class="loading-text">SYNCING UNIVERSE...</div></div>
    
    <div id="pause-overlay" class="overlay"><div class="pop-content"><h1 class="title-text" style="color:#4facfe;">Paused</h1><button class="btn btn-main" onclick="togglePause(event)">Resume</button><button class="btn" onclick="resetGame(event, true)">REPLAY</button></div></div>
    <div id="level-complete-overlay" class="overlay"><div class="pop-content"><h1 class="title-text" style="color:#2ed573;">Cleared!</h1><button class="btn btn-main" onclick="nextLevel(event)">Next Level</button></div></div>
    <div id="menu-overlay" class="overlay" style="display:flex; background: rgba(10, 4, 16, 0.9);"><h1 class="title-text" style="font-size: 2.5rem; color:#00f2fe;">Orbital Escape</h1><button class="btn btn-main" style="width:200px;" onclick="startGame(event)">Play</button></div>
    <div id="game-over-overlay" class="overlay"><div class="pop-content"><h1 class="title-text">Failed!</h1><button class="btn btn-main" id="btn-ad-life" onclick="watchAdForLife(event)">Recover (AD)</button><button class="btn" onclick="resetGame(event)">Try Again</button></div></div>
    <div id="victory-overlay" class="overlay"><div class="pop-content"><h1 class="title-text" style="color:#fca311;">Orbital Master!</h1><button class="btn btn-main" onclick="showHome(event)">Home</button></div></div>

    <script>
        const BASE_HORIZONTAL_SPEED = 2.5;
        let audioCtx, isMuted = false;
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const starCanvas = document.getElementById('star-canvas'), starCtx = starCanvas.getContext('2d');
        const container = document.getElementById('game-container');
        const lvText = document.getElementById('lv');
        const prText = document.getElementById('pr');
        const hpBox = document.getElementById('hp');
        
        let state = { lv: 1, pr: 0, hp: 3, active: false, sdkReady: false };
        let gears = [], hazards = [], stars = [], player = null, camY = 0, tarY = 0;
        let extraLifeUsed = false, lastSkipTime = 0;
        const SKIP_COOLDOWN = 60000; 

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function toggleMute(e) { e.stopPropagation(); isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "🔇" : "🔊"; }

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = { 
            jump: () => playTone(600, 'sine', 0.2), land: () => playTone(300, 'square', 0.1), 
            dead: () => playTone(100, 'sawtooth', 0.5, 0.2), life: () => playTone(900, 'sine', 0.3, 0.2),
            awesome: () => { playTone(500, 'sine', 0.1); setTimeout(()=>playTone(800, 'sine', 0.2), 80); }
        };

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<80; i++) stars.push({ x: Math.random()*starCanvas.width, y: Math.random()*starCanvas.height, s: Math.random()*2 });
            if (player && player.g) tarY = -player.g.y + canvas.height * 0.6;
        }

        window.onresize = resizeCanvas;
        window.onload = async () => {
            resizeCanvas();
            if (window.CrazyGames && window.CrazyGames.SDK) {
                try { 
                    await window.CrazyGames.SDK.init(); 
                    state.sdkReady = true; 
                } catch (e) { console.warn("SDK Init Failed", e); }
            }
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
            setInterval(updateAdUI, 1000);
            requestAnimationFrame(loop);
        };

        function updateAdUI() {
            let skipBtn = document.getElementById('btn-skip-real');
            if (!skipBtn) return;
            let elapsed = Date.now() - lastSkipTime;
            if (elapsed < SKIP_COOLDOWN) {
                skipBtn.innerHTML = `Wait ${Math.ceil((SKIP_COOLDOWN - elapsed) / 1000)}s`;
                skipBtn.style.opacity = '0.6'; skipBtn.style.pointerEvents = 'none';
            } else { skipBtn.innerHTML = `Skip Level <span class="ad-badge">📺</span>`; skipBtn.style.opacity = '1'; skipBtn.style.pointerEvents = 'auto'; }
        }

        function buildWorld() {
            let hue = ((state.lv - 1) * 45 + 265) % 360; 
            document.body.style.background = `radial-gradient(circle at center, hsl(${hue}, 60%, 20%) 0%, #0a0410 100%)`;
            gears = []; hazards = []; state.pr = 0; 
            let spacing = (state.lv === 1) ? 280 : 350;
            let startY = canvas.height * 0.75;
            for(let i=0; i<=10; i++) {
                let g = { index: i, x: (i===0)?canvas.width/2 : 80+Math.random()*(canvas.width-160), y: startY-(i*spacing), r: 45, d: Math.random()>0.5?1:-1, vx: 0, hasLife: (i === 5) };
                if (state.lv >= 5 && i > 0) g.vx = BASE_HORIZONTAL_SPEED * (Math.random() > 0.5 ? 1 : -1);
                gears.push(g);
                if ([4, 7, 8].includes(state.lv) && i > 0 && i < 10) hazards.push({ x: canvas.width/2, y: g.y + spacing/2, vx: 2 + state.lv*0.1 });
            }
            player = { g: gears[0], a: 0, x: gears[0].x+45, y: gears[0].y, v: {x:0, y:0}, at: true, lastG: null };
            tarY = -player.g.y + canvas.height * 0.6; camY = tarY; updateHUD();
        }
function updateHUD() {
    lvText.innerText = state.lv; 
    prText.innerText = state.pr;
    hpBox.innerHTML = '<div class="heart"></div>'.repeat(Math.max(0, state.hp));
}

        
        

        function grantLife() {
            state.hp = 1; 
            extraLifeUsed = true;
            player.at = true; 
            player.v = {x: 0, y: 0}; 
            tarY = -player.g.y + canvas.height * 0.6;
            document.getElementById('game-over-overlay').style.display = 'none';
            state.active = true;
            updateHUD();
            if (state.sdkReady) window.CrazyGames.SDK.game.gameplayStart();
        }

        function executeSkip() { 
            state.pr = 10; 
            checkWin(); 
            state.active = true; 
        }

        function requestSkip(e) { 
            e.stopPropagation(); 
            if (Date.now() - lastSkipTime < SKIP_COOLDOWN) return; 
            let previousMuteState = isMuted;
            state.active = false; 
            isMuted = true;
            if(!state.sdkReady) { 
                lastSkipTime = Date.now(); isMuted = previousMuteState; executeSkip(); updateAdUI(); return; 
            } 
            window.CrazyGames.SDK.ad.requestAd("rewarded", { 
                adStarted: () => { state.active = false; isMuted = true; },
                adFinished: () => { isMuted = previousMuteState; lastSkipTime = Date.now(); executeSkip(); updateAdUI(); }, 
                adError: () => { isMuted = previousMuteState; state.active = true; updateAdUI(); } 
            }); 
        }
        function watchAdForLife(e) { 
            e.stopPropagation(); 
            let previousMuteState = isMuted;
            state.active = false; 
            isMuted = true;
            
            if(!state.sdkReady) { 
                isMuted = previousMuteState; 
                grantLife(); 
                return; 
            } 
            
            window.CrazyGames.SDK.ad.requestAd("rewarded", { 
                adStarted: () => { state.active = false; isMuted = true; },
                adFinished: () => { isMuted = previousMuteState; grantLife(); }, // 
                adError: () => { isMuted = previousMuteState; state.active = true; } 
            }); 
        }

        

        function startGame(e) { 
            e.stopPropagation(); initAudio(); document.getElementById('menu-overlay').style.display='none'; 
            buildWorld(); state.active=true; 
            if (state.sdkReady) window.CrazyGames.SDK.game.gameplayStart();
        }

        function nextLevel(e) { 
            e.stopPropagation(); document.getElementById('level-complete-overlay').style.display='none'; 
            state.lv++; buildWorld(); state.active=true; 
            if (state.sdkReady) window.CrazyGames.SDK.game.gameplayStart();
        }

        function resetGame(e, keepLevel = false) { 
            if(e) e.stopPropagation(); 
            if(!keepLevel) { state.lv = 1; state.hp = 3; extraLifeUsed = false; } 
            document.querySelectorAll('.overlay').forEach(o=>o.style.display='none'); 
            buildWorld(); state.active = true; 
            if (state.sdkReady) window.CrazyGames.SDK.game.gameplayStart();
        }

        function togglePause(e) { 
            e.stopPropagation(); if (!player) return; 
            state.active = !state.active; 
            document.getElementById('pause-overlay').style.display = state.active ? 'none' : 'flex'; 
            if (state.sdkReady) {
                if (state.active) window.CrazyGames.SDK.game.gameplayStart();
                else window.CrazyGames.SDK.game.gameplayStop();
            }
        }

        function die() {
            sfx.dead(); state.hp--; updateHUD();
            if (state.hp <= 0) { 
                state.active = false; 
                document.getElementById('game-over-overlay').style.display = 'flex'; 
                document.getElementById('btn-ad-life').style.display = extraLifeUsed ? 'none' : 'block'; 
                if (state.sdkReady) window.CrazyGames.SDK.game.gameplayStop();
            } else { 
                player.at = true; player.v = {x: 0, y: 0}; 
                tarY = -player.g.y + canvas.height * 0.6; 
            }
        }

        function checkWin() { 
            if (state.pr >= 10) { 
                state.active = false; 
                document.getElementById(state.lv >= 10 ? 'victory-overlay' : 'level-complete-overlay').style.display='flex'; 
                if (state.sdkReady) { window.CrazyGames.SDK.game.happytime(); window.CrazyGames.SDK.game.gameplayStop(); }
            } 
        }

        let lastTime = 0;
function update(dt) {
            if (!state.active || !player) return;
            camY += (tarY - camY) * 0.1;
            
            gears.forEach(g => { 
                if(g.vx) { 
                    let currentVx = g.vx;
                    if (state.lv === 9) {
                        let distanceToCenter = Math.abs(g.x - (canvas.width / 2));
                        let speedBoost = Math.max(0, 1 - (distanceToCenter / 150)) * 2;
                        currentVx = g.vx * (1 + speedBoost);
                    }
                    g.x += currentVx * dt; 
                    if(g.x < 80) { g.x = 80; g.vx = Math.abs(g.vx); }
                    if(g.x > canvas.width - 80) { g.x = canvas.width - 80; g.vx = -Math.abs(g.vx); }
                } 
                if (state.lv === 10 && (player.g !== g || !player.at)) {
                    g.r = 45 - Math.abs(Math.sin(Date.now() / 1000 + g.index)) * 30;
                
                }
            });

            hazards.forEach(h => { 
                h.x += h.vx * dt; 
                if(h.x<80 || h.x>canvas.width-80) h.vx *= -1; 
                if(!player.at && Math.abs(player.x-h.x)<40 && Math.abs(player.y-h.y)<10) die(); 
            });
                        if (player.at) {
                if (player.g.hasLife) { player.g.hasLife = false; state.hp++; updateHUD(); sfx.life(); }
                let speed = ((state.lv >= 3) ? 0.09 : 0.06) * dt;
                player.a += speed * player.g.d;
                

                player.x = player.g.x + Math.cos(player.a) * player.g.r;
                player.y = player.g.y + Math.sin(player.a) * player.g.r;
                
            } else {

            
                player.x += player.v.x * dt; 
                player.y += player.v.y * dt;
                gears.forEach(g => {
                    if (g !== player.lastG && Math.hypot(player.x-g.x, player.y-g.y) < g.r + 15) {
                        let diff = g.index - player.g.index;
                        if (state.lv === 5 || state.lv === 7) g.vx = 0;
                        player.g = g; player.at = true; player.lastG = null; sfx.land(); 
                        player.a = Math.atan2(player.y-g.y, player.x-g.x);
                        if (diff > 0) {
                            if(diff > 1) { 
                                sfx.awesome(); document.getElementById('awesome-popup').classList.add('show-awesome'); 
                                setTimeout(()=>document.getElementById('awesome-popup').classList.remove('show-awesome'), 800); 
                            }
                            state.pr = g.index; updateHUD(); checkWin();
                        }
                        tarY = -g.y + canvas.height * 0.6;
                    }
                });
                if (player.x < -100 || player.x > canvas.width + 100 || player.y < -camY - 1000 || player.y > -camY + canvas.height + 1000) die();
            }
        }

        // 3. DRAW FUNCTION
        function draw() {
            starCtx.clearRect(0,0,starCanvas.width,starCanvas.height); 
            stars.forEach(s => { starCtx.globalAlpha = 0.25; starCtx.fillStyle="#fff"; starCtx.fillRect(s.x, s.y, 2, 2); }); 
            ctx.clearRect(0,0,canvas.width,canvas.height); 
            if (!player) return;
            ctx.save(); ctx.translate(0, camY);
            gears.forEach(g => {
                ctx.strokeStyle = (player.g === g) ? "#00f2fe" : "#3c6382";
                ctx.lineWidth = (player.g === g) ? 4 : 2;
                ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2); ctx.stroke();
                if (g.hasLife) { 
                    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(g.x, g.y, 8, 0, Math.PI * 2); ctx.fill(); 
                }
            });
            hazards.forEach(h => { ctx.fillStyle="#e63946"; ctx.fillRect(h.x-40, h.y-5, 80, 10); });
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 11, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
        // 4. GAME LOOP
        function loop(timestamp) { 
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 16.66; 
            
            // Smoothly cap lag spikes without breaking the math
            if (dt > 3) dt = 3; 
            if (dt <= 0) dt = 1; 
            
            lastTime = timestamp; 

            update(dt); 
            draw(); 
            requestAnimationFrame(loop); 
        }

        

        function launch() { 
            if (document.querySelector('.overlay[style*="flex"]') || !state.active || !player || !player.at) return; 
            sfx.jump(); let tangent = player.a + (Math.PI/2) * player.g.d; 
            player.v = { x: Math.cos(tangent)*12, y: Math.sin(tangent)*12 }; player.lastG = player.g; player.at = false; 
        }

        window.onmousedown = e => { if(e.target.tagName !== 'BUTTON') launch(); };
        window.ontouchstart = e => { if(e.target.tagName !== 'BUTTON') { e.preventDefault(); launch(); } };
        function showHome(e) { location.reload(); }
    </script>
</body>
</html>
